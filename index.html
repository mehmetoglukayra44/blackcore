<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Market</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="background"></div>

<header>

    <div class="logo">
        BUSINESS MARKET
    </div>

</header>

<section class="hero">

    <div class="glass">

        <h1>WhatsApp Business İşletme Numaraları</h1>

        <p class="subtitle">
            Güvenilir • Hızlı • Profesyonel Hizmet
        </p>

        <div class="cards">

            <div class="card">
                <span>📱</span>
                <h2>Yasal WhatsApp Business</h2>
                <p>
                    İşletmeniz için uygun Business numaraları.
                </p>
            </div>

            <div class="card">
                <span>🎮</span>
                <h2>Oyun Satılır</h2>
                <p>
                    Dijital oyun satış hizmeti mevcuttur.
                </p>
            </div>

            <div class="card">
                <span>♾️</span>
                <h2>Stoklar</h2>
                <p>
                    <strong>Sınırsızdır</strong>
                </p>
            </div>

        </div>

        <div class="note-box">

            <h2>Küçük Not</h2>

            <textarea
            id="note"
            placeholder="Buraya istediğin notu yazabilirsin..."></textarea>

            <button id="save">
                Notu Kaydet
            </button>

            <p id="savedText"></p>

        </div>

    </div>

</section>

<footer>

    © 2026 Business Market

</footer>

<script src="script.js"></script>

</body>
</html>
